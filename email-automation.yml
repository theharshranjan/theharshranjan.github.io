name: Email Automation

on:
  schedule:
    # Runs every 15 minutes. GitHub free-tier schedules can lag by a few
    # minutes during busy periods - that's normal, not a bug.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: email-automation

      - name: Run email automation
        working-directory: email-automation
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
          ZOHO_IMAP_HOST: ${{ secrets.ZOHO_IMAP_HOST }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMPANY_NAME: "Samarpan"
          COMPANY_DESCRIPTION: "a company providing [describe your services here]"
        run: python email_automation.py
